    // ══════════════════════════════════════════
    //  CATEGORY GRID
    // ══════════════════════════════════════════
    function buildCatGrid(gridId, selected, onSelect) {
      const g = document.getElementById(gridId);
      g.innerHTML = '';
      Object.entries(CAT).forEach(([name, { icon }]) => {
        const b = document.createElement('button');
        b.className = 'cat-btn' + (name === selected ? ' selected' : '');
        b.innerHTML = `<span class="cat-emoji">${icon}</span>${name}`;
        b.onclick = () => {
          g.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          onSelect(name);
        };
        g.appendChild(b);
      });
      const add = document.createElement('button');
      add.className = 'cat-btn cat-add';
      add.innerHTML = '<span class="cat-emoji">➕</span>새 추가';
      add.onclick = (e) => { e.stopPropagation(); openNewCatModal(gridId, selected, onSelect); };
      g.appendChild(add);
    }

    // ══════════════════════════════════════════
    //  NEW CATEGORY MODAL
    // ══════════════════════════════════════════
    function openNewCatModal(gridId, currentSel, onSelect) {
      S._ncEmoji = EMOJI_LIST[0]; S._ncGridId = gridId; S._ncCb = onSelect;
      const eg = document.getElementById('emojiGrid');
      eg.innerHTML = '';
      EMOJI_LIST.forEach((em, i) => {
        const b = document.createElement('button');
        b.className = 'emoji-btn' + (i === 0 ? ' active' : '');
        b.textContent = em;
        b.onclick = () => {
          S._ncEmoji = em;
          eg.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          document.getElementById('ncPreviewEmoji').textContent = em;
        };
        eg.appendChild(b);
      });
      document.getElementById('ncName').value = '';
      document.getElementById('ncPreviewEmoji').textContent = EMOJI_LIST[0];
      document.getElementById('ncPreviewName').textContent = '카테고리명';
      document.getElementById('newCatModal').classList.add('open');
    }
    function closeNewCatModal() { document.getElementById('newCatModal').classList.remove('open'); }
    function saveNewCat() {
      const name = document.getElementById('ncName').value.trim();
      if (!name) { alert('카테고리 이름을 입력해주세요'); return; }
      if (CAT[name]) { alert('이미 있는 카테고리 이름입니다'); return; }
      const used = Object.values(S.customCat).map(c => c.color);
      const color = CUSTOM_PALETTE.find(c => !used.includes(c)) || CUSTOM_PALETTE[Object.keys(S.customCat).length % CUSTOM_PALETTE.length];
      S.customCat[name] = { icon: S._ncEmoji, color };
      rebuildCat(); save();
      closeNewCatModal();
      buildCatGrid(S._ncGridId, name, S._ncCb);
      S._ncCb(name);
      if (S._ncGridId === 'catGrid') S.txCat = name;
      if (S._ncGridId === 'budgetCatGrid') S.budgetCat = name;
    }

    // ══════════════════════════════════════════
    //  TRANSACTION MODAL  (add + edit)
    // ══════════════════════════════════════════
    function openTxModal(editId) {
      S.editingTxId = editId;
      const tx = editId ? S.transactions.find(t => t.id === editId) : null;
      document.getElementById('txModalTitle').textContent = editId ? '내역 수정' : '내역 추가';
      document.getElementById('txSaveBtn').textContent = editId ? '수정 완료' : '저장하기';
      const type = tx ? tx.type : 'expense';
      const cat = tx ? tx.category : '식비';
      S.txType = type; S.txCat = cat;
      document.getElementById('amountInput').value = tx ? tx.amount : '';
      document.getElementById('nameInput').value = tx ? tx.name : '';
      document.getElementById('dateInput').value = tx ? tx.date : new Date().toISOString().split('T')[0];
      document.getElementById('expenseBtn').className = 'type-btn' + (type === 'expense' ? ' active expense' : '');
      document.getElementById('incomeBtn').className = 'type-btn' + (type === 'income' ? ' active income' : '');
      buildCatGrid('catGrid', cat, c => S.txCat = c);
      document.getElementById('txModal').classList.add('open');
    }
    function closeTxModal() { document.getElementById('txModal').classList.remove('open'); S.editingTxId = null; }
    function setType(t) {
      S.txType = t;
      document.getElementById('expenseBtn').className = 'type-btn' + (t === 'expense' ? ' active expense' : '');
      document.getElementById('incomeBtn').className = 'type-btn' + (t === 'income' ? ' active income' : '');
    }
    function saveTx() {
      const amount = parseFloat(document.getElementById('amountInput').value);
      const name = document.getElementById('nameInput').value.trim();
      const date = document.getElementById('dateInput').value;
      if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
      if (!name) { alert('내용을 입력해주세요'); return; }
      if (!date) { alert('날짜를 선택해주세요'); return; }
      if (S.editingTxId) {
        const idx = S.transactions.findIndex(t => t.id === S.editingTxId);
        if (idx >= 0) S.transactions[idx] = { ...S.transactions[idx], type: S.txType, amount, name, date, category: S.txCat };
      } else {
        S.transactions.push({ id: uid(), type: S.txType, amount, name, date, category: S.txCat });
      }
      save(); closeTxModal(); render();
    }

    // ══════════════════════════════════════════
    //  BUDGET MODAL
    // ══════════════════════════════════════════
    function openBudgetModal(editCat) {
      const isEdit = !!editCat;
      S.budgetCat = editCat || '식비';
      S.editingBudgetCat = editCat || null;
      // 타이틀
      document.getElementById('budgetModalTitle').textContent = isEdit ? '예산 수정' : '예산 설정';
      document.getElementById('budgetSaveBtn').textContent = isEdit ? '수정 완료' : '저장하기';
      // 수정 모드: 카테고리 선택 숨기고 현재 금액 채우기
      document.getElementById('budgetCatWrap').style.display = isEdit ? 'none' : 'block';
      document.getElementById('budgetDeleteBtn').style.display = isEdit ? 'block' : 'none';
      const existing = isEdit ? (S.budgets[mKey()] || {})[editCat] : null;
      document.getElementById('budgetAmount').value = existing || '';
      if (!isEdit) buildCatGrid('budgetCatGrid', '식비', cat => S.budgetCat = cat);
      document.getElementById('budgetModal').classList.add('open');
    }
    function closeBudgetModal() {
      document.getElementById('budgetModal').classList.remove('open');
      S.editingBudgetCat = null;
    }
    function saveBudget() {
      const amount = parseFloat(document.getElementById('budgetAmount').value);
      if (!amount || amount <= 0) { alert('예산 금액을 입력해주세요'); return; }
      const mk = mKey();
      if (!S.budgets[mk]) S.budgets[mk] = {};
      S.budgets[mk][S.budgetCat] = amount;
      save(); closeBudgetModal(); renderBudget();
    }
    function deleteBudget() {
      const cat = S.editingBudgetCat;
      if (!cat) return;
      document.getElementById('budgetModal').classList.remove('open');
      setTimeout(() => {
        if (!confirm(`'${cat}' 예산을 삭제하시겠습니까?`)) return;
        const mk = mKey();
        if (S.budgets[mk]) delete S.budgets[mk][cat];
        save(); renderBudget();
      }, 80);
    }

    // ══════════════════════════════════════════
    //  ASSET MODAL  (add + edit)
    // ══════════════════════════════════════════
    function setAssetType(type, btn) {
      S.assetType = type;
      document.querySelectorAll('#assetTypeGroup .seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('stockFields').style.display = type === 'stock' ? 'block' : 'none';
      document.getElementById('dividendFields').style.display = type === 'dividend' ? 'block' : 'none';
      document.getElementById('cashFields').style.display = type === 'cash' ? 'block' : 'none';
    }
    function openAssetModal(type, editId) {
      S.editingAssetType = type; S.editingAssetId = editId;
      const rType = type || 'stock';
      S.assetType = rType;
      let existing = null;
      if (editId) {
        if (rType === 'stock') existing = S.stocks.find(s => s.id === editId);
        if (rType === 'dividend') existing = S.dividends.find(d => d.id === editId);
        if (rType === 'cash') existing = S.cashAssets.find(a => a.id === editId);
      }
      document.getElementById('assetModalTitle').textContent = editId ? '자산 수정' : '자산 추가';
      document.getElementById('assetSaveBtn').textContent = editId ? '수정 완료' : '저장하기';
      const btns = document.querySelectorAll('#assetTypeGroup .seg-btn');
      btns.forEach((b, i) => {
        b.classList.remove('active');
        b.disabled = !!editId;
        b.style.opacity = editId ? '0.5' : '1';
      });
      btns[{ stock: 0, dividend: 1, cash: 2 }[rType] || 0].classList.add('active');
      document.getElementById('stockFields').style.display = rType === 'stock' ? 'block' : 'none';
      document.getElementById('dividendFields').style.display = rType === 'dividend' ? 'block' : 'none';
      document.getElementById('cashFields').style.display = rType === 'cash' ? 'block' : 'none';
      ['stockTicker', 'stockName', 'stockQty', 'stockAvg', 'stockCurrent', 'divName', 'divAmount', 'cashName', 'cashAmount'].forEach(id => { const e = document.getElementById(id); if (e) e.value = ''; });
      document.getElementById('divDate').value = new Date().toISOString().split('T')[0];
      // 통화 초기화
      S.divCurrency = 'KRW'; S.usdRate = null;
      if (document.getElementById('curKRW')) {
        document.getElementById('curKRW').classList.add('active');
        document.getElementById('curUSD').classList.remove('active');
        document.getElementById('divAmountLabel').textContent = '배당금 (원)';
        document.getElementById('divAmount').placeholder = '50000';
        document.getElementById('divRatePreview').style.display = 'none';
      }
      if (existing) {
        if (rType === 'stock') {
          document.getElementById('stockTicker').value = existing.ticker;
          document.getElementById('stockName').value = existing.name;
          document.getElementById('stockQty').value = existing.qty;
          document.getElementById('stockAvg').value = existing.avgPrice;
          document.getElementById('stockCurrent').value = existing.currentPrice;
        } else if (rType === 'dividend') {
          document.getElementById('divName').value = existing.name;
          document.getElementById('divAmount').value = existing.amount;
          document.getElementById('divDate').value = existing.date;
        } else {
          document.getElementById('cashName').value = existing.name;
          document.getElementById('cashAmount').value = existing.amount;
          document.getElementById('cashType').value = existing.type;
        }
      }
      document.getElementById('assetModal').classList.add('open');
    }
    function closeAssetModal() {
      document.getElementById('assetModal').classList.remove('open');
      S.editingAssetId = null; S.editingAssetType = null;
      document.querySelectorAll('#assetTypeGroup .seg-btn').forEach(b => { b.disabled = false; b.style.opacity = '1'; });
    }
    function saveAsset() {
      const isEdit = !!S.editingAssetId;
      if (S.assetType === 'stock') {
        const ticker = document.getElementById('stockTicker').value.trim().toUpperCase();
        const name = document.getElementById('stockName').value.trim();
        const qty = parseFloat(document.getElementById('stockQty').value);
        const avg = parseFloat(document.getElementById('stockAvg').value);
        const cur = parseFloat(document.getElementById('stockCurrent').value);
        if (!ticker || !name) { alert('티커와 종목명을 입력해주세요'); return; }
        if (!qty || qty <= 0) { alert('수량을 입력해주세요'); return; }
        if (!avg || avg <= 0) { alert('평균 매수가를 입력해주세요'); return; }
        if (!cur || cur <= 0) { alert('현재가를 입력해주세요'); return; }
        if (isEdit) {
          const idx = S.stocks.findIndex(s => s.id === S.editingAssetId);
          if (idx >= 0) S.stocks[idx] = { ...S.stocks[idx], ticker, name, qty, avgPrice: avg, currentPrice: cur };
        } else {
          const idx = S.stocks.findIndex(s => s.ticker === ticker);
          if (idx >= 0) S.stocks[idx] = { ...S.stocks[idx], name, qty, avgPrice: avg, currentPrice: cur };
          else S.stocks.push({ id: uid(), ticker, name, qty, avgPrice: avg, currentPrice: cur });
        }
      } else if (S.assetType === 'dividend') {
        const name = document.getElementById('divName').value.trim();
        const rawInput = parseFloat(document.getElementById('divAmount').value);
        const date = document.getElementById('divDate').value;
        if (!name) { alert('종목명을 입력해주세요'); return; }
        if (!rawInput || rawInput <= 0) { alert('배당금을 입력해주세요'); return; }
        if (!date) { alert('날짜를 선택해주세요'); return; }
        const amount = getDivAmountKRW();
        if (!amount) {
          alert('USD 환율을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
          return;
        }
        // usdAmount: USD로 입력한 경우 원본 달러 금액 저장
        const usdAmount = S.divCurrency === 'USD' ? rawInput : null;
        const usdRate = S.divCurrency === 'USD' ? S.usdRate : null;
        if (isEdit) {
          const idx = S.dividends.findIndex(d => d.id === S.editingAssetId);
          if (idx >= 0) S.dividends[idx] = { ...S.dividends[idx], name, amount, date, usdAmount, usdRate };
        } else {
          S.dividends.push({ id: uid(), name, amount, date, usdAmount, usdRate });
        }
      } else {
        const name = document.getElementById('cashName').value.trim();
        const amount = parseFloat(document.getElementById('cashAmount').value);
        const type = document.getElementById('cashType').value;
        if (!name) { alert('자산명을 입력해주세요'); return; }
        if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
        if (isEdit) {
          const idx = S.cashAssets.findIndex(a => a.id === S.editingAssetId);
          if (idx >= 0) S.cashAssets[idx] = { ...S.cashAssets[idx], name, amount, type };
        } else {
          S.cashAssets.push({ id: uid(), name, amount, type });
        }
      }
      save(); closeAssetModal(); renderAsset();
    }

    // ══════════════════════════════════════════
    //  DETAIL MODAL — TX
    // ══════════════════════════════════════════
    function openTxDetail(id) {
      const tx = S.transactions.find(t => t.id === id); if (!tx) return;
      const c = catOf(tx.category);
      const [y, m, d] = tx.date.split('-');
      document.getElementById('detailTitle').textContent = `${c.icon} ${tx.name}`;
      document.getElementById('detailBody').innerHTML = `
    <div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      ${[
          ['금액', `<span style="font-weight:700;color:${tx.type === 'income' ? 'var(--income)' : 'var(--expense)'}">${tx.type === 'income' ? '+' : '-'}${fmt(tx.amount)}</span>`],
          ['날짜', `${y}년 ${m}월 ${d}일`],
          ['카테고리', tx.category],
          ['분류', tx.type === 'income' ? '수입' : '지출'],
        ].map(([l, v]) => `<div class="info-row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}
    </div>`;
      document.getElementById('editBtn').onclick = () => { closeDetailModal(); openTxModal(id); };
      document.getElementById('deleteBtn').onclick = () => {
        document.getElementById('detailModal').classList.remove('open');
        setTimeout(() => {
          if (!confirm('이 내역을 삭제하시겠습니까?')) return;
          S.transactions = S.transactions.filter(t => t.id !== id);
          save(); render();
        }, 80);
      };
      document.getElementById('detailModal').classList.add('open');
    }

    // ══════════════════════════════════════════
    //  DETAIL MODAL — ASSET
    // ══════════════════════════════════════════
    function openAssetDetail(type, id) {
      let title = '', body = '', onEdit, onDel;
      if (type === 'stock') {
        const st = S.stocks.find(s => s.id === id); if (!st) return;
        const val = st.currentPrice * st.qty, cost = st.avgPrice * st.qty, gain = val - cost;
        const gp = cost > 0 ? ((gain / cost) * 100).toFixed(2) : '0.00';
        title = `📈 ${st.ticker} (${st.name})`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      ${[['보유 수량', st.qty + '주'], ['평균 매수가', st.avgPrice.toLocaleString() + '원'], ['현재가', st.currentPrice.toLocaleString() + '원'], ['매수 금액', fmt(cost)], ['평가 금액', fmt(val)], ['평가 손익', `<span style="color:${gain >= 0 ? 'var(--sup)' : 'var(--sdown)'};font-weight:700">${gain >= 0 ? '+' : ''}${fmt(gain)} (${gain >= 0 ? '+' : ''}${gp}%)</span>`]]
            .map(([l, v]) => `<div class="info-row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}
    </div>`;
        onEdit = () => openAssetModal('stock', id);
        onDel = () => { S.stocks = S.stocks.filter(s => s.id !== id); };
      } else if (type === 'dividend') {
        const dv = S.dividends.find(v => v.id === id); if (!dv) return;
        const [y, m, dd] = dv.date.split('-');
        title = `💸 ${dv.name} 배당금`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      <div class="info-row"><span style="color:var(--text2)">수령 금액</span><span style="color:var(--income);font-weight:700">+${fmt(dv.amount)}</span></div>
      <div class="info-row"><span style="color:var(--text2)">수령일</span><span>${y}년 ${m}월 ${dd}일</span></div>
    </div>`;
        onEdit = () => openAssetModal('dividend', id);
        onDel = () => { S.dividends = S.dividends.filter(v => v.id !== id); };
      } else {
        const a = S.cashAssets.find(v => v.id === id); if (!a) return;
        title = `${CASH_ICONS[a.type] || '💼'} ${a.name}`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      <div class="info-row"><span style="color:var(--text2)">금액</span><span style="font-weight:700">${fmt(a.amount)}</span></div>
      <div class="info-row"><span style="color:var(--text2)">종류</span><span>${a.type}</span></div>
    </div>`;
        onEdit = () => openAssetModal('cash', id);
        onDel = () => { S.cashAssets = S.cashAssets.filter(v => v.id !== id); };
      }
      document.getElementById('detailTitle').textContent = title;
      document.getElementById('detailBody').innerHTML = body;
      document.getElementById('editBtn').onclick = () => { closeDetailModal(); onEdit(); };
      document.getElementById('deleteBtn').onclick = () => {
        document.getElementById('detailModal').classList.remove('open');
        setTimeout(() => {
          if (!confirm('삭제하시겠습니까?')) return;
          onDel(); save(); renderAsset();
        }, 80);
      };
      document.getElementById('detailModal').classList.add('open');
    }
    function closeDetailModal() { document.getElementById('detailModal').classList.remove('open'); }

    // ══════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════
    load();
    render();
  </script>
</body>
