<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MONI</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F5F0;
      --surface: #FFF;
      --surface2: #F0EDE8;
      --border: #E2DDD6;
      --text: #1A1714;
      --text2: #6B6560;
      --text3: #A09890;
      --accent: #2D6A4F;
      --accent-light: #D8EFE5;
      --danger: #C0392B;
      --danger-light: #FDECEA;
      --income: #2D6A4F;
      --expense: #C0392B;
      --sup: #C0392B;
      --sdown: #1565C0;
      --sans: 'Pretendard', sans-serif;
      --r: 14px;
      --rs: 8px;
      --sh: 0 2px 12px rgba(0, 0, 0, .06);
      --sh2: 0 8px 32px rgba(0, 0, 0, .10);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html {
      overflow-x: hidden;
      overflow-y: scroll;
      /* 데스크탑 스크롤바 항상 표시로 레이아웃 점프 방지 */
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%
    }

    /* 모바일에서만 overscroll 차단 */
    @media (max-width: 768px) {
      body {
        overscroll-behavior: none;
      }
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 15px 0;
      position: sticky;
      top: 0;
      z-index: 10
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .app-title-logo {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3D3A36 0%, #3A7D5A 60%, #52B788 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .month-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: none;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s
    }

    .month-btn:hover {
      background: var(--surface2)
    }

    .month-label {
      font-size: 15px;
      font-weight: 700;
      min-width: 80px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }


    @keyframes monthFlash {
      0% {
        color: var(--text);
      }

      30% {
        color: #6B6560;
      }

      100% {
        color: var(--text);
      }
    }

    .month-flash {
      animation: monthFlash 0.6s ease;
    }

    /* ── Summary ── */
    .summary {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 12px 10px;
    }

    .sum-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 8px;
      min-width: 0;
      flex: 1;
    }

    .sum-label {
      font-size: 9px;
      color: var(--text3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 5px;
      white-space: nowrap;
    }

    .sum-amount {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      display: block;
      width: 100%;
      overflow: hidden;
    }

    .sum-card.balance .sum-amount {
      color: var(--accent)
    }

    .sum-card.expense-card .sum-amount {
      color: var(--expense)
    }

    .sum-card.income-card .sum-amount {
      color: var(--income)
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      padding: 0 20px;
      overflow-x: auto;
      scrollbar-width: none
    }

    .tabs::-webkit-scrollbar {
      display: none
    }

    .tab {
      flex: 1;
      min-width: 56px;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      font-family: var(--sans);
      white-space: nowrap
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--text)
    }

    /* ── Content ── */
    .content {
      padding: 16px 20px
    }


    /* ── Filter / Sort Bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 8px;
    }

    /* 필터 세그먼트: 전체 / 지출 / 수입 */
    .filter-seg {
      display: flex;
      background: var(--surface2);
      border-radius: 99px;
      padding: 3px;
      gap: 2px;
      flex: 1;
    }

    .filter-seg-btn {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 99px;
      background: none;
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      cursor: pointer;
      font-family: var(--sans);
      transition: all .18s;
      white-space: nowrap;
      text-align: center;
    }

    .filter-seg-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .10);
    }

    .filter-seg-btn.active.expense {
      color: var(--expense);
    }

    .filter-seg-btn.active.income {
      color: var(--income);
    }

    /* 날짜 정렬 토글 버튼 */
    .sort-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sort-toggle:hover {
      border-color: var(--text2);
    }

    .sort-toggle .sort-arrow {
      font-size: 13px;
      transition: transform .2s;
    }

    .sort-toggle.asc .sort-arrow {
      transform: rotate(180deg);
    }

    /* ── Transaction List ── */
    .date-group {
      margin-bottom: 20px
    }

    .date-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--rs);
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent
    }

    .tx-item:hover {
      border-color: var(--border);
      box-shadow: var(--sh)
    }

    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0
    }

    .tx-info {
      flex: 1;
      min-width: 0
    }

    .tx-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tx-cat {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px
    }

    .tx-amount {
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0
    }

    .tx-amount.income {
      color: var(--income)
    }

    .tx-amount.expense {
      color: var(--expense)
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 14px
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px
    }

    /* ── Budget ── */
    .budget-section {
      margin-bottom: 24px
    }

    .budget-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px
    }

    .budget-item {
      background: var(--surface);
      border-radius: var(--rs);
      padding: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border)
    }

    .budget-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px
    }

    .budget-cat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700
    }

    .budget-nums {
      font-size: 12px;
      color: var(--text2)
    }

    .budget-bar-bg {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden
    }

    .budget-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .5s
    }

    .budget-bar.ok {
      background: var(--accent)
    }

    .budget-bar.warn {
      background: #E67E22
    }

    .budget-bar.over {
      background: var(--danger)
    }

    .add-budget-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px dashed var(--border);
      border-radius: var(--rs);
      background: none;
      color: var(--text3);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--sans);
      transition: all .15s
    }

    .add-budget-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .budget-edit-btn {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      background: var(--surface2);
      border: none;
      border-radius: 99px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: var(--sans);
      flex-shrink: 0;
    }

    .budget-edit-btn:hover {
      color: var(--text2);
    }

    /* ── Chart ── */
    .chart-section {
      margin-bottom: 24px
    }

    .chart-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px
    }

    .chart-wrap {
      background: var(--surface);
      border-radius: var(--r);
      padding: 16px;
      border: 1px solid var(--border)
    }

    /* donut breakdown table */
    .donut-breakdown {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px
    }

    .donut-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border)
    }

    .donut-row:last-child {
      border-bottom: none
    }

    .donut-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .donut-cat {
      font-size: 12px;
      font-weight: 700;
      width: 60px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0
    }

    .donut-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      min-width: 0
    }

    .donut-track-fill {
      height: 100%;
      border-radius: 99px
    }

    .donut-pct {
      font-size: 11px;
      color: var(--text3);
      width: 42px;
      text-align: right;
      flex-shrink: 0;
      white-space: nowrap
    }

    .donut-amt {
      font-size: 12px;
      font-weight: 700;
      width: 88px;
      text-align: right;
      flex-shrink: 0;
      white-space: nowrap
    }

    /* bar rows */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px
    }

    .bar-label {
      font-size: 11px;
      color: var(--text2);
      width: 52px;
      flex-shrink: 0
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px
    }

    .bar-val {
      font-size: 11px;
      color: var(--text3);
      width: 64px;
      text-align: right;
      flex-shrink: 0
    }

    /* ── Asset ── */
    .asset-hero {
      background: var(--text);
      color: #fff;
      border-radius: var(--r);
      padding: 22px 20px 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden
    }

    .asset-hero::before {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .05)
    }

    .asset-hero-label {
      font-size: 10px;
      color: rgba(255, 255, 255, .55);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .asset-hero-amount {
      white-space: nowrap;
      font-size: clamp(16px, 5vw, 28px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 20px;
      letter-spacing: -1px
    }

    .asset-hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, .12)
    }

    .hero-stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, .45);
      margin-bottom: 5px;
      letter-spacing: .04em
    }

    .hero-stat-val {
      font-size: clamp(10px, 2.8vw, 13px);
      color: rgba(255, 255, 255, .9);
      font-weight: 700;
      white-space: nowrap;
    }

    .asset-section {
      margin-bottom: 24px
    }

    .asset-section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .asset-add-btn {
      font-size: 12px;
      color: var(--accent);
      background: var(--accent-light);
      border: none;
      border-radius: 99px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 700
    }

    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s
    }

    .stock-card:hover {
      box-shadow: var(--sh)
    }

    .stock-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px
    }

    .stock-ticker {
      font-size: 15px;
      font-weight: 800
    }

    .stock-fullname {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px
    }

    .stock-total {
      font-size: clamp(11px, 3.5vw, 15px);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .stock-gain {
      font-size: 12px;
      margin-top: 2px;
      text-align: right
    }

    .stock-gain.up {
      color: var(--sup)
    }

    .stock-gain.down {
      color: var(--sdown)
    }

    .stock-gain.flat {
      color: var(--text3)
    }

    .stock-detail-row {
      display: flex;
      gap: 16px
    }

    .stock-detail-item {
      font-size: 11px;
      color: var(--text3)
    }

    .stock-detail-item span {
      color: var(--text2);
      font-weight: 700
    }

    .asset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all .15s
    }

    .asset-card:hover {
      box-shadow: var(--sh)
    }

    .asset-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0
    }

    .asset-card-info {
      flex: 1
    }

    .asset-card-name {
      font-size: 14px;
      font-weight: 700
    }

    .asset-card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px
    }

    .asset-card-amount {
      font-size: clamp(11px, 3.5vw, 14px);
      font-weight: 700;
      white-space: nowrap;
    }

    .div-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s
    }

    .div-card:hover {
      box-shadow: var(--sh)
    }

    .div-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px
    }

    .div-name {
      font-size: 14px;
      font-weight: 700
    }

    .div-amount {
      font-size: clamp(11px, 3.5vw, 14px);
      font-weight: 700;
      color: var(--income);
      white-space: nowrap;
    }

    .div-sub {
      font-size: 11px;
      color: var(--text3)
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: calc(50% - 220px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      border: none;
      font-size: clamp(16px, 5vw, 28px);
      cursor: pointer;
      box-shadow: var(--sh2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s;
      z-index: 20
    }

    @media(max-width:480px) {
      .fab {
        right: 20px
      }
    }

    .fab:hover {
      transform: scale(1.08)
    }

    .fab:active {
      transform: scale(.95)
    }

    /* ── Modal Base ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      overflow: hidden
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      max-height: 92vh;
      overflow-y: auto;
      overflow-x: hidden
    }

    .modal-overlay.open .modal {
      transform: translateY(0)
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px
    }

    #txModal,
    #budgetModal,
    #assetModal,
    #detailModal {
      z-index: 100
    }

    #newCatModal {
      z-index: 200
    }

    /* ── Forms ── */
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px
    }

    .type-btn {
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--rs);
      background: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--sans);
      transition: all .15s;
      color: var(--text2)
    }

    .type-btn.active.income {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--income)
    }

    .type-btn.active.invest {
      background: #E3F2FD;
      border-color: #1565C0;
      color: #1565C0
    }

    .type-btn.active.expense {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--expense)
    }

    .form-group {
      margin-bottom: 16px
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 6px;
      display: block
    }

    .form-input {
      width: 100%;
      max-width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      font-size: 15px;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      box-sizing: border-box;
      -webkit-appearance: none;

        transform: rotate(-3deg);

      40% {
        transform: rotate(3deg);
      }

      60% {
        transform: rotate(-2deg);
      }

      80% {

      }

<body>
  <div id="app">

      </div>

        <button class="tab" onclick="switchTab('budget',this)">예산</button>
        <button class="tab" onclick="switchTab('asset',this)">📊 자산</button>

  </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script>
    // ══════════════════════════════════════════
    //  CONSTANTS
    // ══════════════════════════════════════════
    const BASE_CAT = {
      식비: { icon: '🍚', color: '#E67E22' }, 카페: { icon: '☕', color: '#A0522D' },
      교통: { icon: '🚇', color: '#3498DB' }, 쇼핑: { icon: '🛍️', color: '#E91E63' },
      여가: { icon: '🎮', color: '#9B59B6' }, 의료: { icon: '💊', color: '#E74C3C' },
      미용: { icon: '💇', color: '#FF9FF3' }, 주거비: { icon: '🏠', color: '#2ECC71' },
      통신: { icon: '📱', color: '#1ABC9C' }, 교육: { icon: '📚', color: '#F39C12' },
      급여: { icon: '💰', color: '#27AE60' }, 기타: { icon: '📦', color: '#95A5A6' },
      재테크: { icon: '🪙', color: '#1565C0' }, 투자: { icon: '📈', color: '#0D47A1' }, 보험: { icon: '🛡️', color: '#1976D2' },
    };
    // 재테크 타입 전용 카테고리 목록
    const INVEST_CATS = new Set(['재테크', '투자', '보험']);
    let CAT = { ...BASE_CAT };

    const CASH_ICONS = { 현금: '💵', 예금: '🏦', 적금: '🪙', CMA: '📋', 기타: '💼' };
    const MONTHS = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
    const EMOJI_MAP = {
      '😊 일상': ['😊', '😎', '🥰', '😴', '🤔', '💪', '🧘', '🚶', '🏃', '🛁', '🪥', '🛏️', '👔', '👟', '🧢'],
      '🍔 음식': ['🍚', '🍜', '🍕', '🍔', '🍣', '🍱', '☕', '🧋', '🍺', '🍷', '🧃', '🍰', '🍩', '🥗', '🥩', '🍙', '🫕', '🥐'],
      '🛍️ 쇼핑': ['🛍️', '🛒', '👗', '👠', '💄', '💍', '⌚', '📦', '🏷️', '💳', '🎀', '🧴', '🧸', '🪞', '🛋️'],
      '🏠 주거': ['🏠', '🏡', '🏢', '🔑', '🪴', '🧹', '🧺', '🪣', '💡', '🔧', '🛁', '🪟', '🚿', '🛏️', '📬'],
      '🚗 교통': ['🚗', '🚇', '🚌', '🚲', '🛵', '✈️', '🚢', '🚕', '⛽', '🛣️', '🚦', '🎫', '🏍️', '🛺', '🚁'],
      '💊 건강': ['💊', '🏥', '💉', '🩺', '🩹', '🦷', '👁️', '🧬', '🏋️', '🧘', '🤸', '⚕️', '🩻', '🩼', '💆'],
      '📚 교육': ['📚', '🏫', '✏️', '📝', '🎓', '🔬', '💻', '🖊️', '📐', '📏', '🎒', '🗂️', '📖', '🧪', '🏆'],
      '🎮 여가': ['🎮', '🎬', '🎵', '🎨', '📷', '🏖️', '⛺', '🎭', '🎪', '🎯', '🎲', '🧩', '🎸', '🎤', '⚽'],
      '💰 금융': ['💰', '💵', '💴', '💸', '🏦', '📈', '📉', '🪙', '💳', '🏧', '💹', '🤑', '🧾', '📊', '💼'],
      '🌟 기타': ['🌟', '⭐', '✨', '🔥', '💫', '🎁', '🎉', '🎊', '🌈', '🍀', '🌙', '☀️', '❄️', '🌊', '🦋'],
    };
    const CUSTOM_PALETTE = ['#8E44AD', '#16A085', '#D35400', '#2980B9', '#884EA0', '#117A65', '#A04000', '#1A5276', '#7D6608', '#1B4F72'];
    const NG = "'Pretendard', sans-serif"; // Chart.js font reference

    // ══════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════
    let S = {
      year: new Date().getFullYear(), month: new Date().getMonth(),
      transactions: [], budgets: {}, stocks: [], dividends: [], cashAssets: [], customCat: {},
      activeTab: 'list', txType: 'expense', txCat: '식비', budgetCat: '식비', assetType: 'stock',
      editingTxId: null, editingAssetType: null, editingAssetId: null,
      divCurrency: 'KRW', usdRate: null, stockCurrency: 'KRW',
      assetTrendYear: new Date().getFullYear(),
      sortKey: 'date-desc', filterKey: 'all',
      _ncEmoji: '🏋️', _ncGridId: '', _ncCb: null, _ncMode: 'add', _ncOrigName: null, _ncSel: null, _ncEmojiTab: '',
    };

    // ══════════════════════════════════════════
    //  STORAGE
    // ══════════════════════════════════════════
    function save() {
      try {
        ['transactions', 'budgets', 'stocks', 'dividends', 'cashAssets', 'customCat']
          .forEach(k => localStorage.setItem('kk_' + k, JSON.stringify(S[k] ?? (Array.isArray(S[k]) ? [] : {}))));
      } catch (e) { console.warn('save error', e); }
    }
    function load() {
      try {
        ['transactions', 'budgets', 'stocks', 'dividends', 'cashAssets', 'customCat'].forEach(k => {
          const v = localStorage.getItem('kk_' + k);
          if (v) S[k] = JSON.parse(v);
        });
      } catch (e) { console.warn('load error', e); }
      // 타입 안전 보장
      if (!Array.isArray(S.transactions)) S.transactions = [];
      if (!Array.isArray(S.stocks)) S.stocks = [];
      if (!Array.isArray(S.dividends)) S.dividends = [];
      if (!Array.isArray(S.cashAssets)) S.cashAssets = [];
      if (typeof S.budgets !== 'object' || Array.isArray(S.budgets)) S.budgets = {};
      if (typeof S.customCat !== 'object' || Array.isArray(S.customCat)) S.customCat = {};
      rebuildCat();
      // 기존 데이터 마이그레이션: 이력 없는 항목에 오늘 날짜로 이력 생성
      const today = new Date().toISOString().split('T')[0];
      S.stocks.forEach(st => {
        if (!st.priceHistory) st.priceHistory = [{ date: today, value: st.currentPrice }];
        if (!st.qtyHistory) st.qtyHistory = [{ date: today, value: st.qty }];
        if (!st.avgHistory) st.avgHistory = [{ date: today, value: st.avgPrice }];
      });
      S.cashAssets.forEach(ca => {
        if (!ca.amountHistory) ca.amountHistory = [{ date: today, value: ca.amount }];
      });
    }
    function rebuildCat() { CAT = { ...BASE_CAT, ...S.customCat }; }

    // ══════════════════════════════════════════
    //  HELPERS
    // ══════════════════════════════════════════
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    const fmt = n => Math.abs(Math.round(n)).toLocaleString('ko-KR') + '원';
    const fmtB = n => {
      const a = Math.abs(Math.round(n));
      if (a >= 100000000) return (a / 100000000).toFixed(1) + '억원';
      if (a >= 10000000) return Math.round(a / 10000000) + '천만원';
      if (a >= 10000) return Math.round(a / 10000) + '만원';
      return a.toLocaleString('ko-KR') + '원';
    };
    const mKey = () => `${S.year}-${String(S.month + 1).padStart(2, '0')}`;
    const curTxs = () => S.transactions.filter(t => t.date.startsWith(mKey()));
    const catOf = n => CAT[n] || { icon: '📦', color: '#95A5A6' };


    // ══════════════════════════════════════════
    //  CURRENCY / EXCHANGE RATE
    // ══════════════════════════════════════════
    function setCurrency(cur) {
      S.divCurrency = cur;
      document.getElementById('curKRW').classList.toggle('active', cur === 'KRW');
      document.getElementById('curUSD').classList.toggle('active', cur === 'USD');
      document.getElementById('divAmountLabel').textContent = cur === 'USD' ? '배당금 (USD $)' : '배당금 (원)';
      document.getElementById('divAmount').placeholder = cur === 'USD' ? '0.00' : '50000';
      document.getElementById('divAmount').value = '';
      const preview = document.getElementById('divRatePreview');
      if (cur === 'USD') {
        preview.style.display = 'block';
        fetchUsdRate();
      } else {
        preview.style.display = 'none';
      }
    }

    async function fetchUsdRate() {
      document.getElementById('divRateText').textContent = '조회 중...';
      document.getElementById('divKrwPreview').textContent = '-';
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const data = await res.json();
        const rate = data.rates && data.rates.KRW;
        if (!rate) throw new Error('no rate');
        S.usdRate = rate;
        document.getElementById('divRateText').textContent =
          '1 USD = ' + Math.round(rate).toLocaleString('ko-KR') + '원';
        onDivAmountInput();
      } catch (e) {
        // fallback: 환율 수동 입력 유도
        S.usdRate = null;
        document.getElementById('divRateText').textContent = '조회 실패 — 직접 입력';
        document.getElementById('divKrwPreview').textContent = '-';
      }
    }

    function onDivAmountInput() {
      if (S.divCurrency !== 'USD') return;
      const usd = parseFloat(document.getElementById('divAmount').value);
      const rate = S.usdRate;
      if (!usd || !rate) { document.getElementById('divKrwPreview').textContent = '-'; return; }
      const krw = Math.round(usd * rate);
      document.getElementById('divKrwPreview').textContent =
        '≈ ' + krw.toLocaleString('ko-KR') + '원';
    }

    // USD → KRW 변환 후 원화 금액 반환
    function getDivAmountKRW() {
      const raw = parseFloat(document.getElementById('divAmount').value);
      if (!raw || raw <= 0) return null;
      if (S.divCurrency === 'KRW') return raw;
      if (!S.usdRate) return null;
      return Math.round(raw * S.usdRate);
    }

    // ── 주식 통화 ──
    function setStockCurrency(cur) {
      S.stockCurrency = cur;
      document.getElementById('stockCurKRW').classList.toggle('active', cur === 'KRW');
      document.getElementById('stockCurUSD').classList.toggle('active', cur === 'USD');
      document.getElementById('stockAvgLabel').textContent = cur === 'USD' ? '평균 매수가 (USD $)' : '평균 매수가 (원)';
      document.getElementById('stockCurrentLabel').textContent = cur === 'USD' ? '현재가 (USD $)' : '현재가 (원)';
      document.getElementById('stockAvg').placeholder = cur === 'USD' ? '0.00' : '70000';
      document.getElementById('stockCurrent').placeholder = cur === 'USD' ? '0.00' : '75000';
      document.getElementById('stockAvg').value = '';
      document.getElementById('stockCurrent').value = '';
      const preview = document.getElementById('stockRatePreview');
      if (cur === 'USD') {
        preview.style.display = 'block';
        fetchStockUsdRate();
      } else {
        preview.style.display = 'none';
      }
    }

    async function fetchStockUsdRate() {
      document.getElementById('stockRateText').textContent = '조회 중...';
      document.getElementById('stockKrwPreview').textContent = '-';
      document.getElementById('stockAvgKrwPreview').textContent = '-';
      try {
        if (!S.usdRate) {
          const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
          const data = await res.json();
          S.usdRate = data.rates && data.rates.KRW;
        }
        if (!S.usdRate) throw new Error('no rate');
        document.getElementById('stockRateText').textContent =
          '1 USD = ' + Math.round(S.usdRate).toLocaleString('ko-KR') + '원';
        onStockPriceInput();
      } catch (e) {
        document.getElementById('stockRateText').textContent = '조회 실패';
      }
    }

    function onStockPriceInput() {
      if (S.stockCurrency !== 'USD' || !S.usdRate) return;
      const avg = parseFloat(document.getElementById('stockAvg').value);
      const cur = parseFloat(document.getElementById('stockCurrent').value);
      document.getElementById('stockAvgKrwPreview').textContent =
        avg ? '≈ ' + Math.round(avg * S.usdRate).toLocaleString('ko-KR') + '원' : '-';
      document.getElementById('stockKrwPreview').textContent =
        cur ? '≈ ' + Math.round(cur * S.usdRate).toLocaleString('ko-KR') + '원' : '-';
    }

    function getStockPriceKRW(inputId) {
      const raw = parseFloat(document.getElementById(inputId).value);
      if (!raw || raw <= 0) return null;
      if (S.stockCurrency === 'KRW') return raw;
      if (!S.usdRate) return null;
      return Math.round(raw * S.usdRate);
    }

    // ══════════════════════════════════════════
    //  NAVIGATION
    // ══════════════════════════════════════════
    // 오늘(현재 월)로 이동
    function goToToday() {
      const now = new Date();
      const ty = now.getFullYear();
      const tm = now.getMonth();
      if (S.year === ty && S.month === tm) return;
      S.year = ty;
      S.month = tm;
      render();
      // 클래스로 깜빡임 처리 (모바일 잔류 없음)
      const el = document.getElementById('monthLabel');
      el.classList.add('month-flash');
      setTimeout(() => el.classList.remove('month-flash'), 600);
    }
    function applyAssetScrollHeights() {
      [
        { wrapperId: 'stockScrollWrap', selector: '.stock-card', count: 3 },
        { wrapperId: 'divScrollWrap', selector: '.div-card', count: 3 },
        { wrapperId: 'cashScrollWrap', selector: '.asset-card', count: 3 },
      ].forEach(({ wrapperId, selector, count }) => {
        const wrap = document.getElementById(wrapperId);
        if (!wrap) return;
        const cards = wrap.querySelectorAll(selector);
        if (cards.length <= count) { wrap.style.maxHeight = ''; return; }
        // 카드 count개의 실제 높이(margin 포함) 합산
        let h = 0;
        cards.forEach((c, i) => {
          if (i >= count) return;
          const style = getComputedStyle(c);
          h += c.getBoundingClientRect().height
            + parseFloat(style.marginTop || 0)
            + parseFloat(style.marginBottom || 0);
        });
        wrap.style.maxHeight = h + 'px';
      });
    }
    function scaleSummaryAmounts() {
      const els = [...document.querySelectorAll('.sum-amount')];
      if (!els.length) return;
      // 각 카드를 13px 기준으로 맞는 최대 크기 계산
      let minSize = 13;
      els.forEach(el => {
        el.style.fontSize = '13px';
        const parent = el.parentElement;
        if (!parent) return;
        const available = parent.clientWidth - 16;
        let size = 13;
        while (el.scrollWidth > available && size > 7) {
          size -= 0.5;
          el.style.fontSize = size + 'px';
        }
        if (size < minSize) minSize = size;
      });
      // 4개 모두 동일한 크기로 통일
      els.forEach(el => { el.style.fontSize = minSize + 'px'; });
    }
    function changeAssetTrendYear(d) {
      const newYear = (S.assetTrendYear || new Date().getFullYear()) + d;
      if (newYear > new Date().getFullYear()) return;
      S.assetTrendYear = newYear;
      renderAsset();
    }
    function changeMonth(d) {
      S.month += d;
      if (S.month > 11) { S.month = 0; S.year++; }
      if (S.month < 0) { S.month = 11; S.year--; }
      render();
    }
    function switchTab(tab, el) {
      S.activeTab = tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('monthNavWrap').style.visibility = tab === 'asset' ? 'hidden' : 'visible';
      renderContent();
    }

    // ══════════════════════════════════════════
    //  MAIN RENDER
    // ══════════════════════════════════════════
    function render() {
      document.getElementById('monthLabel').textContent = `${S.year}년 ${MONTHS[S.month]}`;
      const txs = curTxs();
      const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const inv = txs.filter(t => t.type === 'invest').reduce((s, t) => s + t.amount, 0);
      document.getElementById('totalIncome').textContent = fmt(inc);
      document.getElementById('totalExpense').textContent = fmt(exp);
      document.getElementById('totalInvest').textContent = fmt(inv);
      const bal = inc - exp - inv;
      const bEl = document.getElementById('balance');
      bEl.textContent = (bal < 0 ? '-' : '') + fmt(bal);
      bEl.style.color = bal >= 0 ? 'var(--accent)' : 'var(--expense)';
      renderContent();
      requestAnimationFrame(scaleSummaryAmounts);
    }
    function renderContent() {
      const t = S.activeTab;
      if (t === 'list') renderList();
      else if (t === 'chart') renderChart();
      else if (t === 'budget') renderBudget();
      else renderAsset();
    }
    function handleFab() {
      if (S.activeTab === 'asset') openAssetModal(null, null);
      else openTxModal(null);
    }

    // ══════════════════════════════════════════
    //  LIST TAB
    // ══════════════════════════════════════════
    // 필터 변경 (전체 / 지출 / 수입)
    function setFilter(key) {
      S.filterKey = key;
      renderList();
    }
    // 날짜 정렬 토글
    function toggleSort() {
      S.sortKey = S.sortKey === 'date-desc' ? 'date-asc' : 'date-desc';
      renderList();
    }

    function renderList() {
      const el = document.getElementById('mainContent');
      const allTxs = curTxs();

      // 빈 상태 (필터 적용 전 전체 기준)
      if (!allTxs.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>이번 달 내역이 없습니다<br><small style="display:block;margin-top:8px;color:var(--text3)">+ 버튼으로 추가해보세요</small></div>`;
        return;
      }

      // 필터 적용
      const fk = S.filterKey || 'all';
      let txs = fk === 'expense' ? allTxs.filter(t => t.type === 'expense')
        : fk === 'income' ? allTxs.filter(t => t.type === 'income')
          : fk === 'invest' ? allTxs.filter(t => t.type === 'invest')
            : allTxs;

      // 날짜 정렬
      const asc = S.sortKey === 'date-asc';
      txs = txs.slice().sort((a, b) => asc ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));

      // ── 필터 바 ──
      const filterBar = `
        <div class="filter-bar">
          <div class="filter-seg" style="flex:1">
            <button class="filter-seg-btn${fk === 'all' ? ' active' : ''}" onclick="setFilter('all')">전체</button>
            <button class="filter-seg-btn expense${fk === 'expense' ? ' active' : ''}" onclick="setFilter('expense')">지출</button>
            <button class="filter-seg-btn income${fk === 'income' ? ' active' : ''}" onclick="setFilter('income')">수입</button>
            <button class="filter-seg-btn${fk === 'invest' ? ' active' : ''}" style="${fk === 'invest' ? 'color:#1565C0' : ''}" onclick="setFilter('invest')">재테크</button>
          </div>
          <button class="sort-toggle${asc ? ' asc' : ''}" onclick="toggleSort()">
            <span>${asc ? '오래된순' : '최신순'}</span>
            <span class="sort-arrow">↓</span>
          </button>
        </div>`;

      // ── 날짜 그룹 리스트 ──
      const g = {};
      txs.forEach(t => { if (!g[t.date]) g[t.date] = []; g[t.date].push(t); });

      let listH = '';
      if (!txs.length) {
        listH = `<div class="empty-state" style="padding:40px 20px"><div class="empty-icon">🔍</div>해당 내역이 없습니다</div>`;
      } else {
        Object.entries(g).forEach(([date, items]) => {
          const [, m, d] = date.split('-');
          const dn = ['일', '월', '화', '수', '목', '금', '토'][new Date(date).getDay()];
          const de = items.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
          const di = items.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
          const dv = items.filter(t => t.type === 'invest').reduce((s, t) => s + t.amount, 0);
          const headerRight = fk === 'income'
            ? `<span style="color:var(--income)">+${fmt(di)}</span>`
            : fk === 'invest'
              ? `<span style="color:#1565C0">💰 ${fmt(dv)}</span>`
              : fk === 'expense' || de > 0
                ? `<span style="color:var(--expense)">${de > 0 ? '-' + fmt(de) : ''}</span>`
                : '';
          listH += `<div class="date-group"><div class="date-header"><span>${m}월 ${d}일 (${dn})</span>${headerRight}</div>`;
          items.forEach(t => {
            const ct = catOf(t.category);
            const amtColor = t.type === 'income' ? 'income' : t.type === 'invest' ? '' : 'expense';
            const amtStyle = t.type === 'invest' ? 'style="color:#1565C0"' : '';
            const amtPrefix = t.type === 'income' ? '+' : t.type === 'invest' ? '💰 ' : '-';
            listH += `<div class="tx-item" onclick="openTxDetail('${t.id}')">
              <div class="tx-icon" style="background:${ct.color}22">${ct.icon}</div>
              <div class="tx-info"><div class="tx-name">${t.name}</div><div class="tx-cat">${t.category}${t.type === 'invest' ? ' · 재테크' : ''}</div></div>
              <div class="tx-amount ${amtColor}" ${amtStyle}>${amtPrefix}${fmt(t.amount)}</div>

    // ══════════════════════════════════════════
    //  CHART TAB
    //  - Donut chart for expense categories
    //  - Breakdown table BELOW the donut (icon + name + bar + % + amount)
    //  - Income category bars
    //  - 6-month trend
    // ══════════════════════════════════════════
    function renderChart() {
      const txs = curTxs() || [];
      const expTxs = txs.filter(t => t.type === 'expense');
      const incTxs = txs.filter(t => t.type === 'income');
      const invTxs = txs.filter(t => t.type === 'invest');
      const el = document.getElementById('mainContent');

      const catExp = {}, catInc = {};
      expTxs.forEach(t => { catExp[t.category] = (catExp[t.category] || 0) + t.amount; });
      incTxs.forEach(t => { catInc[t.category] = (catInc[t.category] || 0) + t.amount; });
      const sExp = Object.entries(catExp).sort((a, b) => b[1] - a[1]);
      const sInc = Object.entries(catInc).sort((a, b) => b[1] - a[1]);
      const tExp = sExp.reduce((s, [, v]) => s + v, 0);
      const tInc = sInc.reduce((s, [, v]) => s + v, 0);

      // 1월~12월 고정 추이 (현재 선택 연도)
      const tL = [], tE = [], tI = [], tV = [];
      for (let m = 0; m <= 11; m++) {
        const k = `${S.year}-${String(m + 1).padStart(2, '0')}`;
        const mT = S.transactions.filter(t => t.date.startsWith(k));
        tL.push(MONTHS[m]);
        tE.push(mT.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0));
        tI.push(mT.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0));
        tV.push(mT.filter(t => t.type === 'invest').reduce((s, t) => s + t.amount, 0));
      }

      // Build breakdown rows for expense donut (shown below chart)
      let expBreakH = '';
      if (sExp.length) {
        sExp.forEach(([cat, amt]) => {
          const c = catOf(cat);
          const pct = tExp > 0 ? (amt / tExp * 100).toFixed(1) : 0;
          expBreakH += `<div class="donut-row">
        <div class="donut-dot" style="background:${c.color}"></div>
        <div class="donut-cat">${c.icon} ${cat}</div>
        <div class="donut-track"><div class="donut-track-fill" style="width:${pct}%;background:${c.color}"></div></div>
        <div class="donut-pct">${pct}%</div>
        <div class="donut-amt">${fmt(amt)}</div>
      </div>`;
        });
      }

      // Income breakdown rows
      let incBreakH = '';
      if (sInc.length) {
        sInc.forEach(([cat, amt]) => {
          const c = catOf(cat);
          const pct = tInc > 0 ? (amt / tInc * 100).toFixed(1) : 0;
          incBreakH += `<div class="donut-row">
        <div class="donut-dot" style="background:${c.color}"></div>
        <div class="donut-cat">${c.icon} ${cat}</div>
        <div class="donut-track"><div class="donut-track-fill" style="width:${pct}%;background:${c.color}"></div></div>
        <div class="donut-pct">${pct}%</div>
        <div class="donut-amt">${fmt(amt)}</div>
      </div>`;
        });
      }

      el.innerHTML = `
    ${sExp.length ? `
    <div class="chart-section">
      <div class="chart-title">카테고리별 지출</div>
      <div class="chart-wrap">
        <div style="display:flex;justify-content:center">
          <canvas id="pieChart" style="max-width:260px;max-height:260px"></canvas>
        </div>
        <div class="donut-breakdown">${expBreakH}</div>
      </div>
    </div>` : ''}
    ${sInc.length ? `
    <div class="chart-section">
      <div class="chart-title">카테고리별 수입</div>
      <div class="chart-wrap">
        <div style="display:flex;justify-content:center">
          <canvas id="incPieChart" style="max-width:260px;max-height:260px"></canvas>
        </div>
        <div class="donut-breakdown">${incBreakH}</div>
      </div>
    </div>` : ''}
    <div class="chart-section">
      <div class="chart-title">${S.year}년 월별 현황</div>
      <div class="chart-wrap"><canvas id="barChart" height="200"></canvas></div>
    </div>
    ${!sExp.length && !sInc.length ? `<div class="empty-state"><div class="empty-icon">📊</div>이번 달 내역이 없습니다</div>` : ''}
  `;

      setTimeout(() => {
        const p = document.getElementById('pieChart');
        if (p && sExp.length) {
          new Chart(p, {
            type: 'doughnut',
            data: {
              labels: sExp.map(([c]) => c),
              datasets: [{ data: sExp.map(([, v]) => v), backgroundColor: sExp.map(([c]) => catOf(c).color), borderWidth: 0, hoverOffset: 8 }]
            },
            options: {
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${fmt(c.parsed)}` } } },
              cutout: '62%', animation: { duration: 600 },
              layout: { padding: 10 }
            }
          });
        }
        const ip = document.getElementById('incPieChart');
        if (ip && sInc.length) {
          new Chart(ip, {
            type: 'doughnut',
            data: {
              labels: sInc.map(([c]) => c),
              datasets: [{ data: sInc.map(([, v]) => v), backgroundColor: sInc.map(([c]) => catOf(c).color), borderWidth: 0, hoverOffset: 8 }]
            },
            options: {
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${fmt(c.parsed)}` } } },
              cutout: '62%', animation: { duration: 600 },
              layout: { padding: 10 }
            }
          });
        }
        const b = document.getElementById('barChart');
        if (b) {
          new Chart(b, {
            type: 'bar',
            data: {
              labels: tL,
              datasets: [
                { label: '수입', data: tI, backgroundColor: 'rgba(45,106,79,.75)', borderRadius: 4, borderSkipped: false },
                { label: '지출', data: tE, backgroundColor: 'rgba(192,57,43,.75)', borderRadius: 4, borderSkipped: false },
                { label: '재테크', data: tV, backgroundColor: 'rgba(21,101,192,.7)', borderRadius: 4, borderSkipped: false }
              ]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { labels: { font: { family: NG, size: 12 }, boxWidth: 12 } },
                tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${fmt(c.parsed.y)}` } }
              },
              scales: {
                x: { grid: { display: false }, ticks: { font: { family: NG, size: 9 }, maxRotation: 0 } },
                y: { min: 0, grid: { color: '#F0EDE8' }, ticks: { callback: v => (v / 10000) + '만', font: { family: NG, size: 9 } } }
              },
              animation: { duration: 600 }
            }
          });
        }
      }, 50);
    }

    // ══════════════════════════════════════════
    //  BUDGET TAB
    // ══════════════════════════════════════════
    function renderBudget() {
      const txs = curTxs().filter(t => t.type === 'expense');
      const ct = {};
      txs.forEach(t => { ct[t.category] = (ct[t.category] || 0) + t.amount; });
      const bd = S.budgets[mKey()] || {};
      let bH = '', uH = '';
      new Set([...Object.keys(bd), ...Object.keys(ct)]).forEach(cat => {
        const b = bd[cat]; if (!b) return;
        const s = ct[cat] || 0;
        const p = Math.min((s / b) * 100, 100);
        const c = catOf(cat);
        bH += `<div class="budget-item">
      <div class="budget-top">
        <div class="budget-cat">${c.icon} ${cat}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="budget-nums">${fmt(s)} / ${fmt(b)}</div>
          <button class="budget-edit-btn" onclick="openBudgetModal('${cat}')">수정</button>
        </div>
      </div>
      <div class="budget-bar-bg"><div class="budget-bar ${s > b ? 'over' : p >= 80 ? 'warn' : 'ok'}" style="width:${p}%"></div></div>
      ${s > b ? `<div style="font-size:11px;color:var(--danger);margin-top:6px">⚠️ ${fmt(s - b)} 초과</div>` : ''}
    </div>`;
      });
      new Set([...Object.keys(bd), ...Object.keys(ct)]).forEach(cat => {
        if (bd[cat]) return;
        const c = catOf(cat);
        uH += `<div class="budget-item" style="opacity:.7"><div class="budget-top"><div class="budget-cat">${c.icon} ${cat}</div><div class="budget-nums" style="color:var(--text3)">${fmt(ct[cat] || 0)} (예산 없음)</div></div></div>`;
      });
      document.getElementById('mainContent').innerHTML = `
    ${bH ? `<div class="budget-section"><div class="budget-title">이번 달 예산 현황</div>${bH}</div>` : ''}
    ${uH ? `<div class="budget-section"><div class="budget-title">예산 미설정 지출</div>${uH}</div>` : ''}
    ${!bH && !uH ? `<div class="empty-state"><div class="empty-icon">🎯</div>설정된 예산이 없습니다<br><small style="display:block;margin-top:8px;color:var(--text3)">아래 버튼으로 추가해보세요</small></div>` : ''}
    <button class="add-budget-btn" onclick="openBudgetModal()">+ 예산 추가하기</button>`;
    }

    // ══════════════════════════════════════════
    //  ASSET TAB
    //  - Donut pie for alloc (fixed: no inline width/height attrs — let Chart.js size it)
    //  - Breakdown rows below the pie
    // ══════════════════════════════════════════
    function renderAsset() {
      const el = document.getElementById('mainContent');
      const stockVal = S.stocks.reduce((s, st) => s + (st.currentPrice * st.qty), 0);
      const stockCost = S.stocks.reduce((s, st) => s + (st.avgPrice * st.qty), 0);
      const stockGain = stockVal - stockCost;
      const gainPct = stockCost > 0 ? ((stockGain / stockCost) * 100).toFixed(2) : '0.00';
      const cashTotal = S.cashAssets.reduce((s, a) => s + a.amount, 0);
      const divTotal = S.dividends.reduce((s, d) => s + d.amount, 0);
      const totalAsset = stockVal + cashTotal;

      const allocData = [];
      if (stockVal > 0) allocData.push({ label: '주식', amount: stockVal, color: '#1565C0' });
      if (cashTotal > 0) allocData.push({ label: '현금/예금', amount: cashTotal, color: '#2D6A4F' });
      const allocTotal = allocData.reduce((s, a) => s + a.amount, 0);

      // 총 자산 추이 연도
      if (!S.assetTrendYear) S.assetTrendYear = new Date().getFullYear();
      const trendYear = S.assetTrendYear;
      const assetTrendLabels = MONTHS.slice();
      const assetTrendFinal = [];

      for (let m = 0; m <= 11; m++) {
        const monthStr = `${trendYear}-${String(m + 1).padStart(2, '0')}`;
        const upToKey = monthStr + '-99';

        // 해당 연도 해당 월까지 거래 내역 존재 여부 확인
        const hasTx = S.transactions.some(t => t.date.startsWith(trendYear + '') && t.date <= upToKey);
        // 해당 월까지 자산 이력 존재 여부 확인
        const hasStockHistory = S.stocks.some(st => st.priceHistory && st.priceHistory.some(h => h.date.slice(0, 7) <= monthStr));
        const hasCashHistory = S.cashAssets.some(ca => ca.amountHistory && ca.amountHistory.some(h => h.date.slice(0, 7) <= monthStr));

        if (!hasTx && !hasStockHistory && !hasCashHistory) {
          assetTrendFinal.push(0);
          continue;
        }

        // 해당 월 기준 주식 평가액 계산 (이력 기반)
        let monthStockVal = 0;
        S.stocks.forEach(st => {
          const price = getHistoryValue(st.priceHistory, monthStr) ?? st.currentPrice;
          const qty = getHistoryValue(st.qtyHistory, monthStr) ?? st.qty;
          // 해당 월 이전에 이력이 없으면 포함하지 않음
          const hasHistory = (st.priceHistory && st.priceHistory.some(h => h.date.slice(0, 7) <= monthStr))
            || (st.qtyHistory && st.qtyHistory.some(h => h.date.slice(0, 7) <= monthStr));
          if (hasHistory) monthStockVal += price * qty;
        });

        // 해당 월 기준 현금/예금 합계 (이력 기반)
        let monthCashVal = 0;
        S.cashAssets.forEach(ca => {
          const amt = getHistoryValue(ca.amountHistory, monthStr);
          if (amt !== null) monthCashVal += amt;
        });

        // 해당 월까지 배당금 누계
        const monthDivTotal = S.dividends
          .filter(d => d.date.slice(0, 7) <= monthStr)
          .reduce((s, d) => s + d.amount, 0);

        assetTrendFinal.push(monthStockVal + monthCashVal);
      }


      // 배당금 추이 1월~12월 고정
      const divTrend = [], divLabels = [];
      for (let m = 0; m <= 11; m++) {
        const k = `${S.year}-${String(m + 1).padStart(2, '0')}`;
        divLabels.push(MONTHS[m]);
        divTrend.push(S.dividends.filter(d => d.date.startsWith(k)).reduce((s, d) => s + d.amount, 0));
      }

      // Alloc breakdown rows (same donut-row style as chart tab)
      let allocBreakH = '';
      allocData.forEach(a => {
        const pct = allocTotal > 0 ? (a.amount / allocTotal * 100).toFixed(1) : 0;
        allocBreakH += `<div class="donut-row">
      <div class="donut-dot" style="background:${a.color}"></div>
      <div class="donut-cat">${a.label}</div>
      <div class="donut-track"><div class="donut-track-fill" style="width:${pct}%;background:${a.color}"></div></div>
      <div class="donut-pct">${pct}%</div>
      <div class="donut-amt">${fmt(a.amount)}</div>
    </div>`;
      });

      // Per-stock breakdown
      let stockBreakH = '';
      if (S.stocks.length > 1) {
        S.stocks.forEach(st => {
          const val = st.currentPrice * st.qty;
          const pct = stockVal > 0 ? (val / stockVal * 100).toFixed(1) : 0;
          stockBreakH += `<div class="donut-row">
        <div class="donut-dot" style="background:#1565C0"></div>
        <div class="donut-cat">${st.name}</div>
        <div class="donut-track"><div class="donut-track-fill" style="width:${pct}%;background:#1565C0"></div></div>
        <div class="donut-pct">${pct}%</div>
        <div class="donut-amt">${fmt(val)}</div>
      </div>`;
        });
      }

      // Per-cash-account breakdown
      let cashBreakH = '';
      if (S.cashAssets.length > 1) {
        S.cashAssets.forEach(a => {
          const pct = cashTotal > 0 ? (a.amount / cashTotal * 100).toFixed(1) : 0;
          cashBreakH += `<div class="donut-row">
        <div class="donut-dot" style="background:#2D6A4F"></div>
        <div class="donut-cat">${a.name}</div>
        <div class="donut-track"><div class="donut-track-fill" style="width:${pct}%;background:#2D6A4F"></div></div>
        <div class="donut-pct">${pct}%</div>
        <div class="donut-amt">${fmt(a.amount)}</div>
      </div>`;
        });
      }

      let stockH = '', cashH = '', divH = '';
      S.stocks.forEach(st => {
        const val = st.currentPrice * st.qty, cost = st.avgPrice * st.qty, gain = val - cost;
        const gp = cost > 0 ? ((gain / cost) * 100).toFixed(2) : '0.00';
        const cls = gain > 0 ? 'up' : gain < 0 ? 'down' : 'flat';
        stockH += `<div class="stock-card" onclick="openAssetDetail('stock','${st.id}')">
      <div class="stock-top">
        <div><div class="stock-ticker">${st.name}${st.currency === 'USD' ? ' <span style="font-size:10px;background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:99px;font-weight:700">USD</span>' : ''}</div></div>
        <div><div class="stock-total">${fmt(val)}</div></div>
      </div>
      <div class="stock-detail-row">
        <div class="stock-detail-item">${st.qty}주 · 평균 <span>${st.avgPrice.toLocaleString()}원</span></div>
        <div class="stock-detail-item">현재가 <span>${st.currentPrice.toLocaleString()}원</span></div>
      </div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--text3)">평가 손익</span>
        <span class="stock-gain ${cls}" style="font-size:13px;font-weight:700">${gain >= 0 ? '+' : '-'}${Math.abs(Math.round(gain)).toLocaleString()}원 (${gain >= 0 ? '+' : '-'}${Math.abs(parseFloat(gp)).toFixed(2)}%)</span>
      </div>
    </div>`;
      });
      S.cashAssets.forEach(a => {
        cashH += `<div class="asset-card" onclick="openAssetDetail('cash','${a.id}')">
      <div class="asset-card-icon" style="background:#E8F5E9">${CASH_ICONS[a.type] || '💼'}</div>
      <div class="asset-card-info"><div class="asset-card-name">${a.name}</div><div class="asset-card-sub">${a.type}</div></div>
      <div class="asset-card-amount">${fmt(a.amount)}</div>
    </div>`;
      });
      S.dividends.slice().sort((a, b) => b.date.localeCompare(a.date)).forEach(d => {
        const [y, m, dd] = d.date.split('-');
        const usdTag = d.usdAmount ? ` <span style="font-size:11px;color:var(--text3);font-weight:400">($${d.usdAmount.toFixed(2)})</span>` : '';
        divH += `<div class="div-card" onclick="openAssetDetail('dividend','${d.id}')">
      <div class="div-top"><div class="div-name">💸 ${d.name}</div><div class="div-amount">+${fmt(d.amount)}${usdTag}</div></div>
      <div class="div-sub">${y}년 ${m}월 ${dd}일 수령${d.usdRate ? ` · 환율 ${Math.round(d.usdRate).toLocaleString()}원` : ''}</div>
    </div>`;
      });

      el.innerHTML = `
    <div class="asset-hero">
      <div class="asset-hero-label">총 자산</div>
      <div class="asset-hero-amount">${fmt(totalAsset)}</div>
      <div class="asset-hero-grid">
        <div><div class="hero-stat-label">주식 평가</div><div class="hero-stat-val">${fmt(stockVal)}</div></div>
        <div><div class="hero-stat-label">주식 손익</div><div class="hero-stat-val" style="color:${stockGain >= 0 ? '#EF9A9A' : '#90CAF9'}">${stockGain >= 0 ? '+' : '-'}${fmt(Math.abs(stockGain))}<br><span style="font-size:11px;opacity:.8">${stockGain >= 0 ? '+' : '-'}${Math.abs(parseFloat(gainPct)).toFixed(2)}%</span></div></div>
        <div><div class="hero-stat-label">배당 누계</div><div class="hero-stat-val" style="color:#A5D6A7">+${fmt(divTotal)}</div></div>
      </div>
    </div>

    ${allocData.length ? `
    <div class="asset-section">
      <div class="asset-section-title">자산 배분</div>
      <div class="chart-wrap">
        <div style="display:flex;justify-content:center;margin-bottom:4px">
          <canvas id="allocPie" style="max-width:220px;max-height:220px"></canvas>
        </div>
        <div class="donut-breakdown">${allocBreakH}</div>
        ${stockBreakH ? `<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px">
          <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">주식 종목별</div>
          ${stockBreakH}</div>` : ''}
        ${cashBreakH ? `<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px">
          <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">현금/예금 계좌별</div>
          ${cashBreakH}</div>` : ''}
      </div>
    </div>` : ''}

    <div class="asset-section">
      <div class="asset-section-title">보유 주식 <button class="asset-add-btn" onclick="openAssetModal('stock',null)">+ 추가</button></div>
      <div id="stockScrollWrap" style="${S.stocks.length > 3 ? 'overflow-y:auto;scrollbar-width:thin;padding-right:2px;' : ''}">
        ${stockH || `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">보유 종목이 없습니다</div>`}
      </div>
    </div>
    <div class="asset-section">
      <div class="asset-section-title">배당금 내역 <button class="asset-add-btn" onclick="openAssetModal('dividend',null)">+ 추가</button></div>
      <div id="divScrollWrap" style="${S.dividends.length > 3 ? 'overflow-y:auto;scrollbar-width:thin;padding-right:2px;' : ''}">
        ${divH || `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">배당금 내역이 없습니다</div>`}
      </div>
      ${divTrend.some(v => v > 0) ? `<div class="chart-wrap" style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">월별 배당금 추이</div><canvas id="divChart" height="160"></canvas></div>` : ''}
    </div>
    <div class="asset-section">
      <div class="asset-section-title">현금 / 예금 <button class="asset-add-btn" onclick="openAssetModal('cash',null)">+ 추가</button></div>
      <div id="cashScrollWrap" style="${S.cashAssets.length > 3 ? 'overflow-y:auto;scrollbar-width:thin;padding-right:2px;' : ''}">
        ${cashH || `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">등록된 현금/예금이 없습니다</div>`}
      </div>
    </div>

    <div class="asset-section">
      <div class="asset-section-title" style="margin-bottom:12px">연간 총 자산 추이</div>
      <div class="chart-wrap">

    // ══════════════════════════════════════════
    function buildCatGrid(gridId, selected, onSelect, mode) {
      const g = document.getElementById(gridId);
      g.innerHTML = '';
      g.classList.remove('delete-mode');

      // mode에 따라 표시할 카테고리 필터링
      const entries = Object.entries(CAT).filter(([name]) => {
        if (mode === 'invest') return INVEST_CATS.has(name) || (S.customCat[name] && S.customCat[name]._investType);
        if (mode === 'income') return !INVEST_CATS.has(name);
        if (mode === 'expense') return !INVEST_CATS.has(name);
        return true; // 필터 없음 (예산 등)
      });

      entries.forEach(([name, { icon }]) => {
        const isCustom = !!S.customCat[name];
        const outer = document.createElement('div');
        outer.className = 'cat-btn-outer';
        outer.style.position = 'relative';

        const b = document.createElement('button');
        b.className = 'cat-btn' + (name === selected ? ' selected' : '');
        b.innerHTML = `<span class="cat-emoji">${icon}</span>${name}`;
        b.onclick = () => {
          g.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          onSelect(name);
        };
        outer.appendChild(b);

        if (isCustom) {
          const editDot = document.createElement('button');
          editDot.style.cssText = `
            position:absolute; top:4px; right:4px;
            width:15px; height:15px; border-radius:50%;
            background:var(--text3); color:#fff; border:none;
            font-size:8px; cursor:pointer; display:flex;
            align-items:center; justify-content:center;
            z-index:5; padding:0; line-height:1; opacity:0.85;
          `;
          editDot.textContent = '✎';
          editDot.title = '수정';
          editDot.onclick = (e) => {
            e.stopPropagation();
            openEditCatModal(name, gridId, selected, onSelect);
          };
          outer.appendChild(editDot);
        }

        g.appendChild(outer);
      });

      // 재테크 모드엔 새 추가 버튼 미표시
      if (mode !== 'invest') {
        const add = document.createElement('button');
        add.className = 'cat-btn cat-add';
        add.innerHTML = '<span class="cat-emoji">➕</span>새 추가';
        add.onclick = (e) => { e.stopPropagation(); openNewCatModal(gridId, selected, onSelect); };
        g.appendChild(add);
      }
    }

    function _openCatModal(mode, existingName, gridId, currentSel, onSelect) {
      S._ncMode = mode;
      S._ncOrigName = existingName || null;
      S._ncEmoji = mode === 'edit' ? CAT[existingName].icon : Object.values(EMOJI_MAP)[0][0];
      S._ncGridId = gridId; S._ncCb = onSelect; S._ncSel = currentSel;
      S._ncEmojiTab = Object.keys(EMOJI_MAP)[0];

      document.getElementById('ncModalTitle').textContent = mode === 'edit' ? '카테고리 수정' : '새 카테고리 추가';
      document.getElementById('ncSaveBtn').textContent = mode === 'edit' ? '수정 완료' : '추가하기';
      document.getElementById('ncDeleteBtn').style.display = mode === 'edit' ? 'block' : 'none';

      const nameVal = mode === 'edit' ? existingName : '';
      document.getElementById('ncName').value = nameVal;
      document.getElementById('ncPreviewEmoji').textContent = S._ncEmoji;
      document.getElementById('ncPreviewName').textContent = nameVal || '카테고리명';
      document.getElementById('emojiDirectInput').value = '';
      const ph = document.getElementById('emojiPlaceholder');
      if (ph) ph.style.opacity = '0.4';
      _renderEmojiTabs();
      document.getElementById('newCatModal').classList.add('open');
    }

    function _renderEmojiTabs() {
      const tabBar = document.getElementById('emojiTabBar');
      tabBar.innerHTML = '';
      Object.keys(EMOJI_MAP).forEach(tabName => {
        const btn = document.createElement('button');
        btn.className = 'emoji-tab-btn' + (tabName === S._ncEmojiTab ? ' active' : '');
        btn.textContent = tabName;
        btn.onclick = () => { S._ncEmojiTab = tabName; _renderEmojiTabs(); };
        tabBar.appendChild(btn);
      });
      _renderEmojiGrid(EMOJI_MAP[S._ncEmojiTab]);
    }

    function _renderEmojiGrid(list) {
      const eg = document.getElementById('emojiGrid');
      eg.innerHTML = '';
      list.forEach(em => {
        const b = document.createElement('button');
        b.className = 'emoji-btn' + (em === S._ncEmoji ? ' active' : '');
        b.textContent = em;
        b.onclick = () => { _selectEmoji(em); };
        eg.appendChild(b);
      });
    }

    function _selectEmoji(em) {
      S._ncEmoji = em;
      document.getElementById('ncPreviewEmoji').textContent = em;
      document.getElementById('emojiDirectInput').value = '';
      document.querySelectorAll('#emojiGrid .emoji-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === em);
      });
    }

    function onEmojiDirectInput(val) {
      const match = [...val].find(c => /\p{Emoji}/u.test(c));
      const ph = document.getElementById('emojiPlaceholder');
      if (match) {
        _selectEmoji(match);
        document.getElementById('emojiDirectInput').value = match;
        if (ph) ph.style.opacity = '0';
      } else {
        if (ph) ph.style.opacity = '0.4';
      }
    }

    function openNewCatModal(gridId, currentSel, onSelect) {
      _openCatModal('add', null, gridId, currentSel, onSelect);
    }

    function openEditCatModal(name, gridId, currentSel, onSelect) {
      _openCatModal('edit', name, gridId, currentSel, onSelect);
    }

    function closeNewCatModal() { document.getElementById('newCatModal').classList.remove('open'); }

    function saveNewCat() {
      const name = document.getElementById('ncName').value.trim();
      if (!name) { alert('카테고리 이름을 입력해주세요'); return; }

      if (S._ncMode === 'edit') {
        const origName = S._ncOrigName;
        // 이름이 바뀌었고 이미 존재하는 이름이면 거부
        if (name !== origName && CAT[name]) { alert('이미 있는 카테고리 이름입니다'); return; }
        const color = S.customCat[origName].color;
        // 이름 변경 시 기존 내역/예산 카테고리명도 업데이트
        if (name !== origName) {
          S.transactions.forEach(t => { if (t.category === origName) t.category = name; });
          Object.values(S.budgets).forEach(b => { if (b[origName]) { b[name] = b[origName]; delete b[origName]; } });
          delete S.customCat[origName];
        }
        S.customCat[name] = { icon: S._ncEmoji, color };
        rebuildCat(); save();
        closeNewCatModal();
        const newSel = S._ncSel === origName ? name : S._ncSel;
        S._ncCb(newSel);
        buildCatGrid(S._ncGridId, newSel, S._ncCb);
        if (S._ncGridId === 'catGrid') S.txCat = newSel;
        if (S._ncGridId === 'budgetCatGrid') S.budgetCat = newSel;
      } else {
        if (CAT[name]) { alert('이미 있는 카테고리 이름입니다'); return; }
        const used = Object.values(S.customCat).map(c => c.color);
        const color = CUSTOM_PALETTE.find(c => !used.includes(c)) || CUSTOM_PALETTE[Object.keys(S.customCat).length % CUSTOM_PALETTE.length];
        S.customCat[name] = { icon: S._ncEmoji, color };
        rebuildCat(); save();
        closeNewCatModal();
        buildCatGrid(S._ncGridId, name, S._ncCb);
        S._ncCb(name);
        if (S._ncGridId === 'catGrid') S.txCat = name;
        if (S._ncGridId === 'budgetCatGrid') S.budgetCat = name;
      }
    }

    function deleteCatFromModal() {
      const name = S._ncOrigName;
      if (!name) return;
      const usedInTx = S.transactions.some(t => t.category === name);
      const usedInBudget = Object.values(S.budgets).some(b => b[name]);
      let msg = `'${name}' 카테고리를 삭제하시겠습니까?`;
      if (usedInTx || usedInBudget) {
        msg += `\n\n⚠️ 이 카테고리를 사용 중인 ${usedInTx && usedInBudget ? '내역/예산' : usedInTx ? '내역' : '예산'}이 있습니다.\n해당 항목은 '기타'로 변경됩니다.`;
      }
      document.getElementById('newCatModal').classList.remove('open');
      setTimeout(() => {
        if (!confirm(msg)) return;
        S.transactions.forEach(t => { if (t.category === name) t.category = '기타'; });
        Object.values(S.budgets).forEach(b => { if (b[name]) delete b[name]; });
        delete S.customCat[name];
        rebuildCat(); save();
        const newSel = S._ncSel === name ? Object.keys(CAT)[0] : S._ncSel;
        S._ncCb(newSel);
        buildCatGrid(S._ncGridId, newSel, S._ncCb);
        if (S._ncGridId === 'catGrid') S.txCat = newSel;
        if (S._ncGridId === 'budgetCatGrid') S.budgetCat = newSel;
      }, 80);
    }

    function openTxModal(editId) {
      S.editingTxId = editId;
      const tx = editId ? S.transactions.find(t => t.id === editId) : null;
      document.getElementById('txModalTitle').textContent = editId ? '내역 수정' : '내역 추가';
      document.getElementById('txSaveBtn').textContent = editId ? '수정 완료' : '저장하기';
      const type = tx ? tx.type : 'expense';
      const defaultCat = type === 'invest' ? '재테크' : type === 'income' ? '급여' : '식비';
      const cat = tx ? tx.category : defaultCat;
      S.txType = type; S.txCat = cat;
      document.getElementById('amountInput').value = tx ? tx.amount : '';
      document.getElementById('nameInput').value = tx ? tx.name : '';
      document.getElementById('dateInput').value = tx ? tx.date : new Date().toISOString().split('T')[0];
      document.getElementById('expenseBtn').className = 'type-btn' + (type === 'expense' ? ' active expense' : '');
      document.getElementById('incomeBtn').className = 'type-btn' + (type === 'income' ? ' active income' : '');
      document.getElementById('investBtn').className = 'type-btn' + (type === 'invest' ? ' active invest' : '');
      buildCatGrid('catGrid', cat, c => S.txCat = c, type);
      document.getElementById('txModal').classList.add('open');
    }
    function closeTxModal() { document.getElementById('txModal').classList.remove('open'); S.editingTxId = null; }
    function setType(t) {
      S.txType = t;
      document.getElementById('expenseBtn').className = 'type-btn' + (t === 'expense' ? ' active expense' : '');
      document.getElementById('incomeBtn').className = 'type-btn' + (t === 'income' ? ' active income' : '');
      document.getElementById('investBtn').className = 'type-btn' + (t === 'invest' ? ' active invest' : '');
      // 재테크 선택 시 카테고리를 재테크 전용으로 고정
      if (t === 'invest') {
        S.txCat = '재테크';
        buildCatGrid('catGrid', '재테크', c => S.txCat = c, 'invest');
      } else if (t === 'income') {
        S.txCat = '급여';
        buildCatGrid('catGrid', '급여', c => S.txCat = c, 'income');
      } else {
        S.txCat = '식비';
        buildCatGrid('catGrid', '식비', c => S.txCat = c, 'expense');
      }
    }
    function saveTx() {
      const amount = parseFloat(document.getElementById('amountInput').value);
      const name = document.getElementById('nameInput').value.trim();
      const date = document.getElementById('dateInput').value;
      if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
      if (!name) { alert('내용을 입력해주세요'); return; }
      if (!date) { alert('날짜를 선택해주세요'); return; }
      if (S.editingTxId) {
        const idx = S.transactions.findIndex(t => t.id === S.editingTxId);
        if (idx >= 0) S.transactions[idx] = { ...S.transactions[idx], type: S.txType, amount, name, date, category: S.txCat };
      } else {
        S.transactions.push({ id: uid(), type: S.txType, amount, name, date, category: S.txCat });
      }
      save(); closeTxModal(); render();
    }
