    // 이력에 오늘 날짜 기준 값 추가 (같은 달이면 덮어씀)
    function pushHistory(arr, value) {
      const today = new Date().toISOString().split('T')[0];
      const monthKey = today.slice(0, 7);
      const idx = arr.findIndex(h => h.date.slice(0, 7) === monthKey);
      if (idx >= 0) arr[idx] = { date: today, value };
      else arr.push({ date: today, value });
      arr.sort((a, b) => a.date.localeCompare(b.date));
    }

    // 특정 날짜(YYYY-MM) 기준 가장 최근 이력값 조회
    function getHistoryValue(arr, monthStr) {
      if (!arr || !arr.length) return null;
      const filtered = arr.filter(h => h.date.slice(0, 7) <= monthStr);
      if (!filtered.length) return null;
      return filtered[filtered.length - 1].value;
    }

    function saveAsset() {
      const isEdit = !!S.editingAssetId;
      const today = new Date().toISOString().split('T')[0];
      if (S.assetType === 'stock') {
        const name = document.getElementById('stockName').value.trim();
        const qty = parseFloat(document.getElementById('stockQty').value);
        const rawAvg = parseFloat(document.getElementById('stockAvg').value);
        const rawCur = parseFloat(document.getElementById('stockCurrent').value);
        if (!name) { alert('종목명을 입력해주세요'); return; }
        if (!qty || qty <= 0) { alert('수량을 입력해주세요'); return; }
        if (!rawAvg || rawAvg <= 0) { alert('평균 매수가를 입력해주세요'); return; }
        if (!rawCur || rawCur <= 0) { alert('현재가를 입력해주세요'); return; }
        if (S.stockCurrency === 'USD' && !S.usdRate) {
          alert('USD 환율을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); return;
        }
        const avg = S.stockCurrency === 'USD' ? Math.round(rawAvg * S.usdRate) : rawAvg;
        const cur = S.stockCurrency === 'USD' ? Math.round(rawCur * S.usdRate) : rawCur;
        const extraData = {
          currency: S.stockCurrency,
          usdRate: S.stockCurrency === 'USD' ? S.usdRate : null,
          usdAvgPrice: S.stockCurrency === 'USD' ? rawAvg : null,
          usdCurrentPrice: S.stockCurrency === 'USD' ? rawCur : null,
        };
        if (isEdit) {
          const idx = S.stocks.findIndex(s => s.id === S.editingAssetId);
          if (idx >= 0) {
            const st = S.stocks[idx];
            if (!st.priceHistory) st.priceHistory = [{ date: today, value: st.currentPrice }];
            if (!st.qtyHistory) st.qtyHistory = [{ date: today, value: st.qty }];
            if (!st.avgHistory) st.avgHistory = [{ date: today, value: st.avgPrice }];
            pushHistory(st.priceHistory, cur);
            pushHistory(st.qtyHistory, qty);
            pushHistory(st.avgHistory, avg);
            S.stocks[idx] = { ...st, name, qty, avgPrice: avg, currentPrice: cur, ...extraData };
          }
        } else {
          S.stocks.push({
            id: uid(), name, qty, avgPrice: avg, currentPrice: cur, ...extraData,
            priceHistory: [{ date: today, value: cur }],
            qtyHistory: [{ date: today, value: qty }],
            avgHistory: [{ date: today, value: avg }],
          });
        }
      } else if (S.assetType === 'dividend') {
        const name = document.getElementById('divName').value.trim();
        const rawInput = parseFloat(document.getElementById('divAmount').value);
        const date = document.getElementById('divDate').value;
        if (!name) { alert('종목명을 입력해주세요'); return; }
        if (!rawInput || rawInput <= 0) { alert('배당금을 입력해주세요'); return; }
        if (!date) { alert('날짜를 선택해주세요'); return; }
        const amount = getDivAmountKRW();
        if (!amount) { alert('USD 환율을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); return; }
        const usdAmount = S.divCurrency === 'USD' ? rawInput : null;
        const usdRate = S.divCurrency === 'USD' ? S.usdRate : null;
        if (isEdit) {
          const idx = S.dividends.findIndex(d => d.id === S.editingAssetId);
          if (idx >= 0) S.dividends[idx] = { ...S.dividends[idx], name, amount, date, usdAmount, usdRate };
        } else {
          S.dividends.push({ id: uid(), name, amount, date, usdAmount, usdRate });
        }
      } else {
        const name = document.getElementById('cashName').value.trim();
        const amount = parseFloat(document.getElementById('cashAmount').value);
        const type = document.getElementById('cashType').value;
        if (!name) { alert('자산명을 입력해주세요'); return; }
        if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
        if (isEdit) {
          const idx = S.cashAssets.findIndex(a => a.id === S.editingAssetId);
          if (idx >= 0) {
            const ca = S.cashAssets[idx];
            if (!ca.amountHistory) ca.amountHistory = [{ date: today, value: ca.amount }];
            pushHistory(ca.amountHistory, amount);
            S.cashAssets[idx] = { ...ca, name, amount, type };
          }
        } else {
          S.cashAssets.push({
            id: uid(), name, amount, type,
            amountHistory: [{ date: today, value: amount }],
          });
        }
      }
      save(); closeAssetModal(); renderAsset();
    }

    // ══════════════════════════════════════════
    //  DETAIL MODAL — TX
    // ══════════════════════════════════════════
    function openTxDetail(id) {
      const tx = S.transactions.find(t => t.id === id); if (!tx) return;
      const c = catOf(tx.category);
      const [y, m, d] = tx.date.split('-');
      const amtColor = tx.type === 'income' ? 'var(--income)' : tx.type === 'invest' ? '#1565C0' : 'var(--expense)';
      const amtPrefix = tx.type === 'income' ? '+' : tx.type === 'invest' ? '💰 ' : '-';
      const typeLabel = tx.type === 'income' ? '수입' : tx.type === 'invest' ? '재테크' : '지출';
      document.getElementById('detailTitle').textContent = `${c.icon} ${tx.name}`;
      document.getElementById('detailBody').innerHTML = `
    <div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      ${[
          ['금액', `<span style="font-weight:700;color:${amtColor}">${amtPrefix}${fmt(tx.amount)}</span>`],
          ['날짜', `${y}년 ${m}월 ${d}일`],
          ['카테고리', tx.category],
          ['분류', typeLabel],
        ].map(([l, v]) => `<div class="info-row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}
    </div>`;
      document.getElementById('editBtn').onclick = () => { closeDetailModal(); openTxModal(id); };
      document.getElementById('deleteBtn').onclick = () => {
        document.getElementById('detailModal').classList.remove('open');
        setTimeout(() => {
          if (!confirm('이 내역을 삭제하시겠습니까?')) return;
          S.transactions = S.transactions.filter(t => t.id !== id);
          save(); render();
        }, 80);
      };
      document.getElementById('detailModal').classList.add('open');
    }

    // ══════════════════════════════════════════
    //  DETAIL MODAL — ASSET
    // ══════════════════════════════════════════
    function openAssetDetail(type, id) {
      let title = '', body = '', onEdit, onDel;
      if (type === 'stock') {
        const st = S.stocks.find(s => s.id === id); if (!st) return;
        const val = st.currentPrice * st.qty, cost = st.avgPrice * st.qty, gain = val - cost;
        const gp = cost > 0 ? ((gain / cost) * 100).toFixed(2) : '0.00';
        title = `📈 ${st.name}`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      ${[['보유 수량', st.qty + '주'], ['평균 매수가', st.avgPrice.toLocaleString() + '원' + (st.currency === 'USD' && st.usdAvgPrice ? ' ($' + st.usdAvgPrice + ')' : '')], ['현재가', st.currentPrice.toLocaleString() + '원' + (st.currency === 'USD' && st.usdCurrentPrice ? ' ($' + st.usdCurrentPrice + ')' : '')], ['매수 금액', fmt(cost)], ['평가 금액', fmt(val)], ['평가 손익', `<span style="color:${gain >= 0 ? 'var(--sup)' : 'var(--sdown)'};font-weight:700">${gain >= 0 ? '+' : '-'}${fmt(Math.abs(gain))} (${gain >= 0 ? '+' : '-'}${Math.abs(parseFloat(gp)).toFixed(2)}%)</span>`]]
            .map(([l, v]) => `<div class="info-row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}
    </div>`;
        onEdit = () => openAssetModal('stock', id);
        onDel = () => { S.stocks = S.stocks.filter(s => s.id !== id); };
      } else if (type === 'dividend') {
        const dv = S.dividends.find(v => v.id === id); if (!dv) return;
        const [y, m, dd] = dv.date.split('-');
        title = `💸 ${dv.name} 배당금`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      <div class="info-row"><span style="color:var(--text2)">수령 금액</span><span style="color:var(--income);font-weight:700">+${fmt(dv.amount)}</span></div>
      <div class="info-row"><span style="color:var(--text2)">수령일</span><span>${y}년 ${m}월 ${dd}일</span></div>
    </div>`;
        onEdit = () => openAssetModal('dividend', id);
        onDel = () => { S.dividends = S.dividends.filter(v => v.id !== id); };
      } else {
        const a = S.cashAssets.find(v => v.id === id); if (!a) return;
        title = `${CASH_ICONS[a.type] || '💼'} ${a.name}`;
        body = `<div style="background:var(--surface2);border-radius:var(--rs);padding:16px">
      <div class="info-row"><span style="color:var(--text2)">금액</span><span style="font-weight:700">${fmt(a.amount)}</span></div>
      <div class="info-row"><span style="color:var(--text2)">종류</span><span>${a.type}</span></div>
    </div>`;
        onEdit = () => openAssetModal('cash', id);
        onDel = () => { S.cashAssets = S.cashAssets.filter(v => v.id !== id); };
      }
      document.getElementById('detailTitle').textContent = title;
      document.getElementById('detailBody').innerHTML = body;
      document.getElementById('editBtn').onclick = () => { closeDetailModal(); onEdit(); };
      document.getElementById('deleteBtn').onclick = () => {
        document.getElementById('detailModal').classList.remove('open');
        setTimeout(() => {
          if (!confirm('삭제하시겠습니까?')) return;
          onDel(); save(); renderAsset();
        }, 80);
      };
      document.getElementById('detailModal').classList.add('open');
    }
    function closeDetailModal() { document.getElementById('detailModal').classList.remove('open'); }

    // ══════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════
    load();
    render();
  </script>
</body>

</html>
